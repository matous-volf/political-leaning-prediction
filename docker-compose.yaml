---
services:
  notebook:
    build: .
    volumes:
      - .:/usr/src/app
      - huggingface_cache:/.cache/huggingface
    ports:
      - "8000:8000"
      - "6006:6006"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

volumes:
  huggingface_cache:
